<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>acpx Session Viewer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>acpx <span class="badge">Sessions</span></h1>
        <button id="refreshBtn" title="Refresh">&#8635;</button>
      </div>
      <div id="sessionList" class="session-list">
        <div class="loading">Loading…</div>
      </div>
    </aside>

    <main id="main">
      <div id="welcome" class="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>acpx Session Viewer</h2>
        <p>Select a session from the left to view its details.</p>
      </div>
      <div id="detail" class="detail hidden">
        <div class="detail-header">
          <div>
            <h2 id="detailTitle">Session</h2>
            <div id="detailMeta" class="detail-meta"></div>
          </div>
          <div class="detail-actions">
            <button id="showEventsBtn" class="btn-secondary">Show Events</button>
          </div>
        </div>
        <div id="detailTabs" class="tabs">
          <button class="tab active" data-tab="info">Info</button>
          <button class="tab" data-tab="messages">Messages</button>
          <button class="tab" data-tab="events">Events</button>
          <button class="tab" data-tab="raw">Raw JSON</button>
        </div>
        <div id="tabContent" class="tab-content"></div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
